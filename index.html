<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Set in Stone? — A Workday Extend Model First learning game by Sreenivas Raman" />
<title>Set in Stone? 🦁💙 — Loading…</title>

<!-- ============================================================
     SMART ROUTER
     Detects mobile vs desktop and redirects to the right version.
     - mobile.html: bins on top, sticky deck at bottom (touch-friendly)
     - desktop.html: deck on left, bins on right (drag-and-drop optimized)
     User can override via direct links: mobile.html or desktop.html
     ============================================================ -->

<style>
  body {
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #e3f2fd 0%, #fff8e1 100%);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1e88e5;
  }
  .loader {
    text-align: center;
    padding: 40px 20px;
  }
  .loader h1 {
    font-size: 28px;
    margin: 0 0 12px;
    color: #1e88e5;
  }
  .loader .emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 14px;
    animation: bounce 1.2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .loader p {
    color: #555;
    font-size: 14px;
    margin: 6px 0;
  }
  .loader .links {
    margin-top: 28px;
    font-size: 13px;
    color: #999;
  }
  .loader .links a {
    color: #1e88e5;
    text-decoration: none;
    margin: 0 8px;
    font-weight: 600;
  }
  .loader .links a:hover { text-decoration: underline; }
  .spinner {
    border: 3px solid #e3f2fd;
    border-top-color: #1e88e5;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    animation: spin 0.8s linear infinite;
    margin: 18px auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loader">
  <span class="emoji">🦁💙</span>
  <h1>Set in Stone?</h1>
  <p>Workday Extend Model First game</p>
  <div class="spinner"></div>
  <p id="status" style="margin-top: 16px; font-size: 12px; color: #999;">Detecting your device…</p>

  <div class="links">
    If you're not redirected automatically, choose:<br/>
    <a href="mobile.html">📱 Mobile version</a> ·
    <a href="desktop.html">🖥️ Desktop version</a>
  </div>
</div>

<script>
  // Detect mobile vs desktop using multiple signals
  function isMobileDevice() {
    // Signal 1: User agent (catches most phones and tablets in mobile mode)
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var uaMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(ua.toLowerCase());

    // Signal 2: Touch capability
    var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // Signal 3: Screen width (≤900px is treated as mobile/small tablet)
    var smallScreen = window.innerWidth <= 900;

    // Mobile if: explicit mobile UA, OR (touch + small screen)
    return uaMobile || (hasTouch && smallScreen);
  }

  // Read URL hash for explicit override (e.g. ?force=desktop or ?force=mobile)
  function getForceParam() {
    var params = new URLSearchParams(window.location.search);
    return params.get('force');
  }

  // Route after a short delay so the user sees the loader briefly
  setTimeout(function() {
    var force = getForceParam();
    var target;

    if (force === 'mobile') {
      target = 'mobile.html';
      document.getElementById('status').textContent = 'Loading mobile version (forced)…';
    } else if (force === 'desktop') {
      target = 'desktop.html';
      document.getElementById('status').textContent = 'Loading desktop version (forced)…';
    } else if (isMobileDevice()) {
      target = 'mobile.html';
      document.getElementById('status').textContent = 'Loading mobile version…';
    } else {
      target = 'desktop.html';
      document.getElementById('status').textContent = 'Loading desktop version…';
    }

    // Use replace so the back button doesn't bring users back here
    window.location.replace(target);
  }, 600);
</script>

</body>
</html>
